{% extends "base.html" %}
{% load static %}

{% block content %}
<main class="min-h-full flex items-center justify-center px-6 py-16">
    <div class="w-full max-w-md">
        <a href="{% url 'home' %}" class="inline-block mb-8" aria-label="ekiptahmin.com — anasayfa">
            <img src="{% static 'brand/logo.svg' %}" alt="ekiptahmin.com" class="h-10 w-auto">
        </a>

        <div class="rounded-2xl border border-line bg-surface backdrop-blur-xl p-6 sm:p-8">
            {% block card_title %}{% endblock %}
            {% block card_content %}{% endblock %}
        </div>

        {% block card_footer %}{% endblock %}
    </div>
</main>
{% endblock %}
