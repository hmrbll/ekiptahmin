{% load static %}
<header class="border-b border-white/5 px-6 py-4 flex items-center justify-between">
    <a href="{% url 'home' %}" class="text-sm font-semibold text-slate-300 hover:text-white transition">
        ekiptahmin<span class="text-emerald-400">.com</span>
    </a>
    {% if user.is_authenticated %}
    <div class="flex items-center gap-4 text-sm">
        <a href="{% url 'prediction_rounds' %}" class="text-slate-300 hover:text-white transition">Tahminler</a>
        <a href="{% url 'results' %}" class="text-slate-300 hover:text-white transition">Sonuçlar</a>
        <a href="{% url 'leaderboard' %}" class="text-slate-300 hover:text-white transition">Puan Durumu</a>
        {% if user.is_staff %}
        <a href="{% url 'admin_results_entry' %}" class="text-amber-300/80 hover:text-amber-200 transition">Sonuç Gir</a>
        {% endif %}
        <span class="text-slate-500 hidden sm:inline">·</span>
        <span class="text-slate-400 hidden sm:inline">{{ user.nickname|default:user.email }}</span>
        <form method="post" action="{% url 'logout' %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="text-slate-400 hover:text-white transition">Çıkış</button>
        </form>
    </div>
    {% else %}
    <a href="{% url 'login' %}"
       class="rounded-full border border-white/20 bg-white/5 px-4 py-2 text-sm hover:bg-white/10 transition">
        Giriş yap
    </a>
    {% endif %}
</header>
