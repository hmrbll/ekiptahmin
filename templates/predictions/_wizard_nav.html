{# Step pills shown above each wizard page. #}
{% if steps|length > 1 %}
<nav class="mb-6 -mx-1 overflow-x-auto">
    <div class="flex gap-1.5 px-1 pb-2 min-w-max">
        {% for s in steps %}
            {% if forloop.counter0 == current_step_idx %}
                <span class="px-3 py-1.5 rounded-lg bg-emerald-500/15 border border-emerald-400/40 text-emerald-200 text-xs font-medium whitespace-nowrap">{{ s.label }}</span>
            {% else %}
                <a href="{{ s.url }}" class="px-3 py-1.5 rounded-lg bg-white/5 border border-white/10 text-slate-400 hover:text-white hover:bg-white/10 text-xs whitespace-nowrap transition">{{ s.label }}</a>
            {% endif %}
        {% endfor %}
    </div>
</nav>
{% endif %}
