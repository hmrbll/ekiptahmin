databases:
  - name: ekiptahmin-db
    plan: starter
    databaseName: ekiptahmin
    user: ekiptahmin
    region: frankfurt

services:
  - type: web
    name: ekiptahmin
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --workers 2 --threads 2"
    healthCheckPath: /admin/login/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ekiptahmin.com,www.ekiptahmin.com,.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: ekiptahmin-db
          property: connectionString
      - key: SITE_URL
        value: https://ekiptahmin.com
      - key: DEFAULT_FROM_EMAIL
        value: noreply@ekiptahmin.com
      - key: RESEND_API_KEY
        sync: false
